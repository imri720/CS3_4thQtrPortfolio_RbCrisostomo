<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: white; color: black;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            border: 2px solid black;
            padding: 20px;
        }
        h2 { text-align: center; text-transform: uppercase; margin-top: 0; }
        .field { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], select {
            width: 100%; border: 1px solid black;
            padding: 5px; box-sizing: border-box;
        }
        .star-rating { font-size: 24px; cursor: pointer; }
        .star { color: #ccc; }
        .star.active { color: yellow; -webkit-text-stroke: 1px black; }
        #addBtn {
            width: 100%; padding: 10px; cursor: pointer;
            font-weight: bold; background: #007bff; color: white;
            border: none; border-radius: 4px; margin-bottom: 20px;
        }
        #movieList { margin-top: 20px; }
        .movie-entry {
            border: 1px solid #ddd; padding: 10px;
            margin-bottom: 10px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .list-stars { color: yellow; -webkit-text-stroke: 0.5px black; }
        .delete-btn {
            padding: 2px 8px; cursor: pointer;
            background: #f8f9fa; border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Add / Update a Movie Rating</h2>
    
    <div class="field">
        <label>Title:</label>
        <input type="text" id="title">
    </div>

    <div class="field">
        <label>Year:</label>
        <input type="text" id="year">
    </div>

    <div class="field">
        <label>Genre:</label>
        <select id="genre">
            <option value="Action">Action</option>
            <option value="Comedy">Comedy</option>
            <option value="Drama">Drama</option>
            <option value="Horror">Horror</option>
        </select>
    </div>

    <div class="field">
        <label>Rating:</label>
        <div id="starInput" class="star-rating">
            <span class="star" data-v="1">&#9733;</span>
            <span class="star" data-v="2">&#9733;</span>
            <span class="star" data-v="3">&#9733;</span>
            <span class="star" data-v="4">&#9733;</span>
            <span class="star" data-v="5">&#9733;</span>
        </div>
    </div>

    <button id="addBtn">Add Movie</button>

    <h2 style="border-top:1px solid #eee; padding-top:10px;">Movie List</h2>
    <div id="movieList"></div>
</div>

<script>
let rating = 0;
const starElements = document.querySelectorAll('#starInput .star');

starElements.forEach(s => {
    s.addEventListener('click', () => {
        rating = parseInt(s.getAttribute('data-v'));
        starElements.forEach(el => {
            el.classList.toggle('active', el.getAttribute('data-v') <= rating);
        });
    });
});

document.getElementById('addBtn').addEventListener('click', function() {
    const t = document.getElementById('title').value.trim();
    const y = document.getElementById('year').value.trim();
    const g = document.getElementById('genre').value;

    if (!t || !y || rating === 0) {
        alert("Fill all fields!");
        return;
    }

    let store = JSON.parse(localStorage.getItem('movies')) || [];
    const idx = store.findIndex(m => m.title.toLowerCase() === t.toLowerCase());

    if (idx !== -1) {
        let oldR = parseFloat(store[idx].rating);
        store[idx].year = y;
        store[idx].genre = g;
        store[idx].rating = ((oldR + rating) / 2).toFixed(1);
    } else {
        store.push({
            title: t,
            year: y,
            genre: g,
            rating: rating.toString()
        });
    }

    localStorage.setItem('movies', JSON.stringify(store));
    document.getElementById('title').value = '';
    document.getElementById('year').value = '';
    rating = 0;
    starElements.forEach(el => el.classList.remove('active'));
    render();
});

function deleteMovie(index) {
    if (confirm("Are you sure you want to delete?")) {
        let store = JSON.parse(localStorage.getItem('movies')) || [];
        store.splice(index, 1);
        localStorage.setItem('movies', JSON.stringify(store));
        render();
    }
}

function render() {
    const container = document.getElementById('movieList');
    container.innerHTML = '';
    const store = JSON.parse(localStorage.getItem('movies')) || [];

    store.forEach((m, i) => {
        const div = document.createElement('div');
        div.className = 'movie-entry';
        
        let stars = '';
        const rounded = Math.round(parseFloat(m.rating));
        for(let j=0; j<5; j++) {
            stars += (j < rounded) ? '&#9733;' : '&#9734;';
        }

        div.innerHTML = `
            <span>
                ${m.title} (${m.year}) - ${m.genre}, Rating: 
                <span class="list-stars">${stars}</span>
            </span>
            <button class="delete-btn" onclick="deleteMovie(${i})">Delete</button>
        `;
        container.appendChild(div);
    });
}

render();
</script>

</body>
</html>
