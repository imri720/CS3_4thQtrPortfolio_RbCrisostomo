<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Portfolio</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: white;
            color: black;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            border: 2px solid black;
            padding: 20px;
        }

        h2 {
            text-align: center;
            text-transform: uppercase;
            margin-top: 0;
        }

        .field {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input[type="text"], select {
            width: 100%;
            border: 1px solid black;
            padding: 5px;
            box-sizing: border-box;
        }

        .star-rating {
            font-size: 24px;
            cursor: pointer;
        }

        .star {
            color: #ccc;
        }

        .star.active {
            color: yellow;
            -webkit-text-stroke: 1px black;
        }

        button {
            width: 100%;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            background: white;
            border: 2px solid black;
        }

        button:active {
            background: black;
            color: white;
        }

        #movieList {
            margin-top: 20px;
        }

        .movie-entry {
            border: 1px solid black;
            padding: 10px;
            margin-bottom: 10px;
        }

        .list-stars {
            color: yellow;
            -webkit-text-stroke: 0.5px black;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Add a Movie</h2>
        
        <div class="field">
            <label>Title:</label>
            <input type="text" id="title">
        </div>

        <div class="field">
            <label>Year:</label>
            <input type="text" id="year">
        </div>

        <div class="field">
            <label>Genre:</label>
            <select id="genre">
                <option value="Action">Action</option>
                <option value="Comedy">Comedy</option>
                <option value="Drama">Drama</option>
                <option value="Horror">Horror</option>
            </select>
        </div>

        <div class="field">
            <label>Rating:</label>
            <div id="starInput" class="star-rating">
                <span class="star" data-v="1">&#9733;</span>
                <span class="star" data-v="2">&#9733;</span>
                <span class="star" data-v="3">&#9733;</span>
                <span class="star" data-v="4">&#9733;</span>
                <span class="star" data-v="5">&#9733;</span>
            </div>
        </div>

        <button id="addBtn">Add Movie</button>

        <h2>Movie List</h2>
        <div id="movieList"></div>
    </div>

    <script>
        let rating = 0;
        const starElements = document.querySelectorAll('#starInput .star');

        starElements.forEach(s => {
            s.addEventListener('click', () => {
                rating = s.getAttribute('data-v');
                starElements.forEach(el => {
                    el.classList.toggle('active', el.getAttribute('data-v') <= rating);
                });
            });
        });

        document.getElementById('addBtn').addEventListener('click', () => {
            const t = document.getElementById('title').value;
            const y = document.getElementById('year').value;
            const g = document.getElementById('genre').value;

            if (!t || !y || rating === 0) return;

            const movieObj = {
                title: t,
                year: y.toString(),
                genre: g,
                rating: rating.toString()
            };

            const store = JSON.parse(localStorage.getItem('movies')) || [];
            store.push(movieObj);
            localStorage.setItem('movies', JSON.stringify(store));

            document.getElementById('title').value = '';
            document.getElementById('year').value = '';
            rating = 0;
            starElements.forEach(el => el.classList.remove('active'));

            render();
        });

        function render() {
            const container = document.getElementById('movieList');
            container.innerHTML = '';
            const store = JSON.parse(localStorage.getItem('movies')) || [];

            store.forEach(m => {
                const div = document.createElement('div');
                div.className = 'movie-entry';
                let s = '';
                for(let i=0; i<parseInt(m.rating); i++) s += '&#9733;';
                
                div.innerHTML = `${m.title} (${m.year}) - ${m.genre}, Rating: <span class="list-stars">${s}</span>`;
                container.appendChild(div);
            });
        }

        render();
    </script>
</body>
</html>
